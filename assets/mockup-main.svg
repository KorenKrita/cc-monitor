<svg xmlns="http://www.w3.org/2000/svg" width="480" height="320" viewBox="0 0 480 320">
  <!-- Window background - exact: bg #0E1223, no decorations, borderRadius 12 from Tauri -->
  <rect width="480" height="320" rx="12" fill="#0E1223"/>

  <!-- Close button - top left, 12x12, green circle -->
  <circle cx="12" cy="12" r="6" fill="#22C55E"/>
  <text x="12" y="14.5" font-family="system-ui" font-size="9" fill="#064E3B" text-anchor="middle" font-weight="700">×</text>

  <!-- Quit button - bottom left, 16x16, red ⏻ -->
  <text x="14" y="312" font-family="system-ui" font-size="12" fill="#EF4444" text-anchor="middle">⏻</text>

  <!-- Settings gear - bottom right -->
  <text x="468" y="314" font-family="system-ui" font-size="14" fill="#94A3B8" text-anchor="middle">⚙</text>

  <!-- Content area starts at padding 20 -->
  <!-- Top row: MetricTabs (left) + TimeRangeTabs (right), marginBottom 14 -->

  <!-- MetricTabs: flex, gap 2, bg mutedBg #272F42, borderRadius 8, padding 3 -->
  <rect x="20" y="20" width="108" height="26" rx="8" fill="#272F42"/>
  <!-- Active tab "Out": padding 4px 10px, borderRadius 6, bg #272F42, color #22C55E -->
  <rect x="23" y="23" width="34" height="20" rx="6" fill="#272F42"/>
  <text x="40" y="36" font-family="'Fira Sans', system-ui" font-size="11" fill="#22C55E" text-anchor="middle" font-weight="500">Out</text>
  <!-- Inactive "In" -->
  <text x="72" y="36" font-family="'Fira Sans', system-ui" font-size="11" fill="#64748B" text-anchor="middle">In</text>
  <!-- Inactive "TTFT" -->
  <text x="107" y="36" font-family="'Fira Sans', system-ui" font-size="11" fill="#64748B" text-anchor="middle">TTFT</text>

  <!-- TimeRangeTabs: right aligned -->
  <rect x="340" y="20" width="120" height="26" rx="8" fill="#272F42"/>
  <!-- Active "1h" -->
  <rect x="343" y="23" width="26" height="20" rx="6" fill="#272F42"/>
  <text x="356" y="36" font-family="'Fira Sans', system-ui" font-size="11" fill="#F8FAFC" text-anchor="middle">1h</text>
  <!-- Inactive "Today" -->
  <text x="393" y="36" font-family="'Fira Sans', system-ui" font-size="11" fill="#64748B" text-anchor="middle">Today</text>
  <!-- Inactive "Yesterday" -->
  <text x="440" y="36" font-family="'Fira Sans', system-ui" font-size="11" fill="#64748B" text-anchor="middle">Yday</text>

  <!-- Main area: top 60 (20 padding + 26 tabs + 14 gap), flex row, gap 14 -->
  <!-- ModelFilter: width 100, paddingRight 14, borderRight 1px solid #272F42 -->

  <!-- "MODELS" label -->
  <text x="20" y="72" font-family="'Fira Sans', system-ui" font-size="9" fill="#64748B" letter-spacing="0.5">MODELS</text>

  <!-- Model checkboxes, gap 8 -->
  <!-- All checkbox -->
  <rect x="20" y="82" width="10" height="10" rx="2" fill="#94A3B8"/>
  <text x="36" y="91" font-family="'Fira Sans', system-ui" font-size="10" fill="#F8FAFC">All</text>

  <!-- opus-4-7: color #6366f1 -->
  <rect x="20" y="100" width="10" height="10" rx="2" fill="#6366f1"/>
  <text x="36" y="109" font-family="'Fira Sans', system-ui" font-size="10" fill="#F8FAFC">opus-4-7</text>

  <!-- sonnet-4-6: color #22C55E -->
  <rect x="20" y="118" width="10" height="10" rx="2" fill="#22C55E"/>
  <text x="36" y="127" font-family="'Fira Sans', system-ui" font-size="10" fill="#F8FAFC">sonnet-4-6</text>

  <!-- haiku-4-5: color #F59E0B -->
  <rect x="20" y="136" width="10" height="10" rx="2" fill="#F59E0B"/>
  <text x="36" y="145" font-family="'Fira Sans', system-ui" font-size="10" fill="#F8FAFC">haiku-4-5</text>

  <!-- Border right of ModelFilter at x=120 (20 + 100) -->
  <line x1="120" y1="60" x2="120" y2="300" stroke="#272F42" stroke-width="1"/>

  <!-- Latest section at bottom of ModelFilter -->
  <line x1="20" y1="265" x2="106" y2="265" stroke="#272F42" stroke-width="1"/>
  <text x="20" y="280" font-family="'Fira Sans', system-ui" font-size="8" fill="#64748B" letter-spacing="0.5">LATEST</text>
  <text x="20" y="298" font-family="'Fira Sans', system-ui" font-size="14" fill="#F8FAFC" font-weight="500">42</text>
  <text x="20" y="310" font-family="'Fira Sans', system-ui" font-size="9" fill="#64748B">tok/s</text>

  <!-- Chart area: starts at x=134 (120 + 14 gap), flex 1, bg #1A1E2F, borderRadius 8, padding 8 -->
  <rect x="134" y="60" width="326" height="240" rx="8" fill="#1A1E2F"/>

  <!-- ECharts grid: top 12, right 12, bottom 28, left 40 -->
  <!-- Chart inner area: x=134+8+40=182, y=60+8+12=80, w=326-8-8-40-12=258, h=240-8-8-12-28=184 -->

  <!-- Y-axis labels: fontSize 9, Fira Code, color #64748B -->
  <text x="178" y="84" font-family="'Fira Code', monospace" font-size="9" fill="#64748B" text-anchor="end">80</text>
  <text x="178" y="130" font-family="'Fira Code', monospace" font-size="9" fill="#64748B" text-anchor="end">60</text>
  <text x="178" y="176" font-family="'Fira Code', monospace" font-size="9" fill="#64748B" text-anchor="end">40</text>
  <text x="178" y="222" font-family="'Fira Code', monospace" font-size="9" fill="#64748B" text-anchor="end">20</text>
  <text x="178" y="268" font-family="'Fira Code', monospace" font-size="9" fill="#64748B" text-anchor="end">0</text>

  <!-- Grid lines: color #272F42, solid -->
  <line x1="182" y1="80" x2="440" y2="80" stroke="#272F42" stroke-width="0.5"/>
  <line x1="182" y1="126" x2="440" y2="126" stroke="#272F42" stroke-width="0.5"/>
  <line x1="182" y1="172" x2="440" y2="172" stroke="#272F42" stroke-width="0.5"/>
  <line x1="182" y1="218" x2="440" y2="218" stroke="#272F42" stroke-width="0.5"/>
  <line x1="182" y1="264" x2="440" y2="264" stroke="#272F42" stroke-width="0.5"/>

  <!-- X-axis labels: fontSize 9, Fira Code -->
  <text x="215" y="284" font-family="'Fira Code', monospace" font-size="9" fill="#64748B" text-anchor="middle">14:00</text>
  <text x="280" y="284" font-family="'Fira Code', monospace" font-size="9" fill="#64748B" text-anchor="middle">14:15</text>
  <text x="345" y="284" font-family="'Fira Code', monospace" font-size="9" fill="#64748B" text-anchor="middle">14:30</text>
  <text x="410" y="284" font-family="'Fira Code', monospace" font-size="9" fill="#64748B" text-anchor="middle">14:45</text>

  <!-- Chart lines: width 2, smooth -->
  <!-- opus-4-7 line (#6366f1) - higher throughput -->
  <polyline points="190,220 210,200 230,185 250,195 270,170 290,155 310,160 330,140 350,148 370,135 390,142 410,128 430,138" fill="none" stroke="#6366f1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- sonnet-4-6 line (#22C55E) - medium throughput -->
  <polyline points="190,245 210,235 230,225 250,232 270,215 290,205 310,212 330,195 350,200 370,190 390,196 410,185 430,192" fill="none" stroke="#22C55E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- haiku-4-5 line (#F59E0B) - lower throughput -->
  <polyline points="190,255 210,248 230,242 250,246 270,238 290,232 310,236 330,225 350,228 370,222 390,226 410,218 430,223" fill="none" stroke="#F59E0B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
