<svg xmlns="http://www.w3.org/2000/svg" width="960" height="640" viewBox="0 0 960 640">
  <defs>
    <linearGradient id="chartLine1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0.8"/>
    </linearGradient>
    <linearGradient id="chartLine2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22C55E;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#22C55E;stop-opacity:0.8"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="640" fill="#1a1a2e" rx="0"/>

  <!-- macOS Menu Bar -->
  <rect x="0" y="0" width="960" height="28" fill="#1c1c1e" opacity="0.95"/>
  <text x="880" y="18" font-family="SF Mono, Fira Code, monospace" font-size="11" fill="#e2e8f0" text-anchor="end">⟨opus⟩ 42 tok/s │ 128 tok/s │ 1.2s</text>

  <!-- App Window -->
  <rect x="240" y="60" width="480" height="320" rx="12" fill="#0E1223" filter="url(#shadow)" stroke="#272F42" stroke-width="1"/>

  <!-- Metric Tabs -->
  <rect x="260" y="80" width="70" height="24" rx="6" fill="#272F42"/>
  <text x="295" y="96" font-family="SF Mono, Fira Code, monospace" font-size="10" fill="#F8FAFC" text-anchor="middle">out tok/s</text>
  <rect x="336" y="80" width="62" height="24" rx="6" fill="transparent"/>
  <text x="367" y="96" font-family="SF Mono, Fira Code, monospace" font-size="10" fill="#64748B" text-anchor="middle">in tok/s</text>
  <rect x="404" y="80" width="42" height="24" rx="6" fill="transparent"/>
  <text x="425" y="96" font-family="SF Mono, Fira Code, monospace" font-size="10" fill="#64748B" text-anchor="middle">ttft</text>

  <!-- Time Range Tabs -->
  <rect x="600" y="80" width="32" height="24" rx="6" fill="#272F42"/>
  <text x="616" y="96" font-family="SF Mono, Fira Code, monospace" font-size="10" fill="#F8FAFC" text-anchor="middle">1h</text>
  <text x="652" y="96" font-family="SF Mono, Fira Code, monospace" font-size="10" fill="#64748B" text-anchor="middle">today</text>
  <text x="698" y="96" font-family="SF Mono, Fira Code, monospace" font-size="10" fill="#64748B" text-anchor="middle">yday</text>

  <!-- Model Filter Sidebar -->
  <text x="268" y="130" font-family="SF Mono, Fira Code, monospace" font-size="8" fill="#64748B" letter-spacing="0.5">MODELS</text>
  <rect x="268" y="140" width="8" height="8" rx="2" fill="#6366f1"/>
  <text x="282" y="148" font-family="SF Mono, Fira Code, monospace" font-size="9" fill="#F8FAFC">opus-4-7</text>
  <rect x="268" y="158" width="8" height="8" rx="2" fill="#22C55E"/>
  <text x="282" y="166" font-family="SF Mono, Fira Code, monospace" font-size="9" fill="#F8FAFC">sonnet-4-6</text>
  <rect x="268" y="176" width="8" height="8" rx="2" fill="#F59E0B"/>
  <text x="282" y="184" font-family="SF Mono, Fira Code, monospace" font-size="9" fill="#94A3B8">haiku-4-5</text>

  <!-- Latest Value -->
  <line x1="268" y1="320" x2="340" y2="320" stroke="#272F42" stroke-width="1"/>
  <text x="268" y="336" font-family="SF Mono, Fira Code, monospace" font-size="7" fill="#64748B" letter-spacing="0.5">LATEST</text>
  <text x="268" y="352" font-family="SF Mono, Fira Code, monospace" font-size="14" fill="#F8FAFC" font-weight="500">42 tok/s</text>

  <!-- Chart Area -->
  <rect x="350" y="120" width="356" height="240" rx="8" fill="#1A1E2F"/>

  <!-- Y-axis labels -->
  <text x="360" y="140" font-family="SF Mono, Fira Code, monospace" font-size="8" fill="#64748B">80</text>
  <text x="360" y="180" font-family="SF Mono, Fira Code, monospace" font-size="8" fill="#64748B">60</text>
  <text x="360" y="220" font-family="SF Mono, Fira Code, monospace" font-size="8" fill="#64748B">40</text>
  <text x="360" y="260" font-family="SF Mono, Fira Code, monospace" font-size="8" fill="#64748B">20</text>
  <text x="360" y="300" font-family="SF Mono, Fira Code, monospace" font-size="8" fill="#64748B">0</text>

  <!-- Grid lines -->
  <line x1="380" y1="136" x2="696" y2="136" stroke="#272F42" stroke-width="0.5"/>
  <line x1="380" y1="176" x2="696" y2="176" stroke="#272F42" stroke-width="0.5"/>
  <line x1="380" y1="216" x2="696" y2="216" stroke="#272F42" stroke-width="0.5"/>
  <line x1="380" y1="256" x2="696" y2="256" stroke="#272F42" stroke-width="0.5"/>
  <line x1="380" y1="296" x2="696" y2="296" stroke="#272F42" stroke-width="0.5"/>

  <!-- X-axis labels -->
  <text x="400" y="345" font-family="SF Mono, Fira Code, monospace" font-size="8" fill="#64748B">14:00</text>
  <text x="480" y="345" font-family="SF Mono, Fira Code, monospace" font-size="8" fill="#64748B">14:15</text>
  <text x="560" y="345" font-family="SF Mono, Fira Code, monospace" font-size="8" fill="#64748B">14:30</text>
  <text x="640" y="345" font-family="SF Mono, Fira Code, monospace" font-size="8" fill="#64748B">14:45</text>

  <!-- Chart Line 1 (Opus - purple) -->
  <polyline points="390,260 420,240 440,220 460,250 480,200 510,180 530,190 550,160 570,170 590,150 610,165 630,140 650,155 670,145 690,150" fill="none" stroke="#6366f1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Chart Line 2 (Sonnet - green) -->
  <polyline points="390,280 420,270 440,260 460,275 480,250 510,240 530,255 550,230 570,235 590,220 610,230 630,215 650,225 670,210 690,220" fill="none" stroke="#22C55E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Quit button -->
  <text x="254" y="372" font-family="system-ui" font-size="12" fill="#EF4444">⏻</text>

  <!-- Settings gear -->
  <text x="700" y="372" font-family="system-ui" font-size="11" fill="#64748B">⚙</text>

  <!-- Caption below window -->
  <text x="480" y="430" font-family="SF Pro Display, system-ui, sans-serif" font-size="13" fill="#94A3B8" text-anchor="middle">Dark theme — Real-time output token rate by model</text>

  <!-- Feature highlights -->
  <text x="480" y="500" font-family="SF Pro Display, system-ui, sans-serif" font-size="20" fill="#F8FAFC" text-anchor="middle" font-weight="600">CC Monitor</text>
  <text x="480" y="530" font-family="SF Pro Display, system-ui, sans-serif" font-size="13" fill="#94A3B8" text-anchor="middle">Real-time Claude Code performance metrics in your macOS menu bar</text>

  <!-- Feature pills -->
  <rect x="200" y="560" width="120" height="28" rx="14" fill="#272F42"/>
  <text x="260" y="578" font-family="SF Mono, Fira Code, monospace" font-size="10" fill="#6366f1" text-anchor="middle">Token Rate</text>

  <rect x="340" y="560" width="100" height="28" rx="14" fill="#272F42"/>
  <text x="390" y="578" font-family="SF Mono, Fira Code, monospace" font-size="10" fill="#22C55E" text-anchor="middle">TTFT</text>

  <rect x="460" y="560" width="130" height="28" rx="14" fill="#272F42"/>
  <text x="525" y="578" font-family="SF Mono, Fira Code, monospace" font-size="10" fill="#F59E0B" text-anchor="middle">Multi-Model</text>

  <rect x="610" y="560" width="150" height="28" rx="14" fill="#272F42"/>
  <text x="685" y="578" font-family="SF Mono, Fira Code, monospace" font-size="10" fill="#EC4899" text-anchor="middle">Menu Bar Live</text>
</svg>
