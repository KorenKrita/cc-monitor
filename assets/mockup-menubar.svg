<svg xmlns="http://www.w3.org/2000/svg" width="960" height="500" viewBox="0 0 960 500">
  <defs>
    <filter id="shadow2">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="500" fill="#1a1a2e"/>

  <!-- Menu Bar Detail -->
  <rect x="130" y="40" width="700" height="44" rx="10" fill="#1c1c1e" filter="url(#shadow2)" stroke="#333" stroke-width="0.5"/>

  <!-- Left side menu bar items -->
  <text x="150" y="66" font-family="SF Pro Display, system-ui" font-size="13" fill="#999"></text>
  <text x="180" y="66" font-family="SF Pro Display, system-ui" font-size="13" fill="#ccc">Finder</text>
  <text x="240" y="66" font-family="SF Pro Display, system-ui" font-size="13" fill="#999">File</text>
  <text x="280" y="66" font-family="SF Pro Display, system-ui" font-size="13" fill="#999">Edit</text>

  <!-- Right side - CC Monitor tray text highlighted -->
  <rect x="500" y="48" width="310" height="28" rx="4" fill="#6366f1" opacity="0.15"/>
  <text x="510" y="67" font-family="SF Mono, Fira Code, monospace" font-size="12" fill="#e2e8f0">έθρopus-4-7έθσ 42έΗΣ έΦΓ 128έΗΥ έΦΓ έΠ▒1.2s</text>

  <!-- Arrow pointing to tray -->
  <line x1="655" y1="82" x2="655" y2="110" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="650,110 660,110 655,118" fill="#6366f1"/>

  <!-- Annotation -->
  <text x="655" y="140" font-family="SF Pro Display, system-ui" font-size="12" fill="#94A3B8" text-anchor="middle">Live metrics update on every Claude Code request</text>

  <!-- Three display mode examples -->
  <!-- Mode 1: Last Request -->
  <rect x="80" y="180" width="260" height="120" rx="10" fill="#0E1223" stroke="#272F42" stroke-width="1"/>
  <text x="210" y="210" font-family="SF Pro Display, system-ui" font-size="11" fill="#64748B" text-anchor="middle" letter-spacing="0.5">LAST REQUEST MODE</text>
  <text x="210" y="245" font-family="SF Mono, Fira Code, monospace" font-size="14" fill="#F8FAFC" text-anchor="middle">έθρopus-4-7έθσ 42έΗΣ έΦΓ 128έΗΥ έΦΓ έΠ▒1.2s</text>
  <text x="210" y="275" font-family="SF Pro Display, system-ui" font-size="10" fill="#94A3B8" text-anchor="middle">Shows the most recent request's metrics</text>

  <!-- Mode 2: Average -->
  <rect x="360" y="180" width="260" height="120" rx="10" fill="#0E1223" stroke="#272F42" stroke-width="1"/>
  <text x="490" y="210" font-family="SF Pro Display, system-ui" font-size="11" fill="#64748B" text-anchor="middle" letter-spacing="0.5">AVERAGE MODE (5 MIN)</text>
  <text x="490" y="245" font-family="SF Mono, Fira Code, monospace" font-size="14" fill="#F8FAFC" text-anchor="middle">έθρavgέθσ 38έΗΣ έΦΓ 112έΗΥ έΦΓ έΠ▒1.8s</text>
  <text x="490" y="275" font-family="SF Pro Display, system-ui" font-size="10" fill="#94A3B8" text-anchor="middle">Rolling average over configurable window</text>

  <!-- Mode 3: Whitelist Filter -->
  <rect x="640" y="180" width="260" height="120" rx="10" fill="#0E1223" stroke="#272F42" stroke-width="1"/>
  <text x="770" y="210" font-family="SF Pro Display, system-ui" font-size="11" fill="#64748B" text-anchor="middle" letter-spacing="0.5">MODEL WHITELIST</text>
  <text x="770" y="245" font-family="SF Mono, Fira Code, monospace" font-size="14" fill="#F8FAFC" text-anchor="middle">έθρsonnet-4-6έθσ 65έΗΣ έΦΓ 200έΗΥ</text>
  <text x="770" y="275" font-family="SF Pro Display, system-ui" font-size="10" fill="#94A3B8" text-anchor="middle">Only show specific models you care about</text>

  <!-- Configurable items section -->
  <text x="480" y="350" font-family="SF Pro Display, system-ui" font-size="14" fill="#F8FAFC" text-anchor="middle" font-weight="500">Configurable Status Bar Items</text>

  <!-- Item chips -->
  <rect x="200" y="375" width="110" height="32" rx="8" fill="#1A1E2F" stroke="#6366f1" stroke-width="1"/>
  <text x="255" y="395" font-family="SF Mono, Fira Code, monospace" font-size="10" fill="#6366f1" text-anchor="middle">out_rate έΗΣ</text>

  <rect x="330" y="375" width="100" height="32" rx="8" fill="#1A1E2F" stroke="#22C55E" stroke-width="1"/>
  <text x="380" y="395" font-family="SF Mono, Fira Code, monospace" font-size="10" fill="#22C55E" text-anchor="middle">in_rate έΗΥ</text>

  <rect x="450" y="375" width="80" height="32" rx="8" fill="#1A1E2F" stroke="#F59E0B" stroke-width="1"/>
  <text x="490" y="395" font-family="SF Mono, Fira Code, monospace" font-size="10" fill="#F59E0B" text-anchor="middle">ttft έΠ▒</text>

  <rect x="550" y="375" width="100" height="32" rx="8" fill="#1A1E2F" stroke="#EC4899" stroke-width="1"/>
  <text x="600" y="395" font-family="SF Mono, Fira Code, monospace" font-size="10" fill="#EC4899" text-anchor="middle">model έθρ έθσ</text>

  <!-- Drag hint -->
  <text x="680" y="395" font-family="SF Pro Display, system-ui" font-size="10" fill="#64748B">έΗΡ drag to reorder</text>

  <!-- Bottom note -->
  <text x="480" y="460" font-family="SF Pro Display, system-ui" font-size="11" fill="#64748B" text-anchor="middle">Click menu bar text to toggle the chart popover έΑλ Auto-hides on focus loss</text>
</svg>
