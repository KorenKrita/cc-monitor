<svg xmlns="http://www.w3.org/2000/svg" width="320" height="580" viewBox="0 0 320 1120" font-family="'Fira Sans', system-ui">
  <defs>
    <clipPath id="windowClip"><rect width="320" height="580" rx="12"/></clipPath>
  </defs>
  <!-- Background -->
  <rect width="320" height="1120" rx="12" fill="#0E1223"/>

  <!-- Title -->
  <text x="160" y="28" text-anchor="middle" fill="#F8FAFC" font-size="13" font-weight="600">Settings</text>
  <line x1="12" y1="40" x2="308" y2="40" stroke="#272F42"/>

  <!-- Theme -->
  <text x="16" y="62" fill="#64748B" font-size="9" letter-spacing="0.5">THEME</text>
  <rect x="16" y="68" width="288" height="26" rx="4" fill="#1A1E2F" stroke="#272F42"/>
  <text x="24" y="85" fill="#F8FAFC" font-size="11">System</text>
  <polygon points="292,80 296,80 294,84" fill="#64748B"/>

  <!-- Status Bar Model Filter -->
  <text x="16" y="114" fill="#64748B" font-size="9" letter-spacing="0.5">STATUS BAR MODEL FILTER</text>
  <rect x="16" y="120" width="288" height="26" rx="4" fill="#1A1E2F" stroke="#272F42"/>
  <text x="24" y="137" fill="#F8FAFC" font-size="11">Last Used</text>
  <polygon points="292,132 296,132 294,136" fill="#64748B"/>

  <!-- Display Mode -->
  <text x="16" y="166" fill="#64748B" font-size="9" letter-spacing="0.5">DISPLAY MODE</text>
  <rect x="16" y="172" width="288" height="26" rx="4" fill="#1A1E2F" stroke="#272F42"/>
  <text x="24" y="189" fill="#F8FAFC" font-size="11">Last Request</text>
  <polygon points="292,184 296,184 294,188" fill="#64748B"/>

  <!-- Status Bar Items -->
  <text x="16" y="218" fill="#64748B" font-size="9" letter-spacing="0.5">STATUS BAR ITEMS</text>
  <!-- Row 1 -->
  <rect x="16" y="224" width="138" height="22" rx="4" fill="#1A1E2F" stroke="#272F42"/>
  <rect x="22" y="229" width="12" height="12" rx="2" fill="#22C55E"/>
  <text x="25" y="239" font-size="8" fill="#fff" font-weight="700">✓</text>
  <text x="40" y="239" fill="#F8FAFC" font-size="10">↓ Out Rate</text>
  <rect x="166" y="224" width="138" height="22" rx="4" fill="#1A1E2F" stroke="#272F42"/>
  <rect x="172" y="229" width="12" height="12" rx="2" fill="#22C55E"/>
  <text x="175" y="239" font-size="8" fill="#fff" font-weight="700">✓</text>
  <text x="190" y="239" fill="#F8FAFC" font-size="10">↑ In Rate</text>
  <!-- Row 2 -->
  <rect x="16" y="250" width="138" height="22" rx="4" fill="#1A1E2F" stroke="#272F42"/>
  <rect x="22" y="255" width="12" height="12" rx="2" fill="#22C55E"/>
  <text x="25" y="265" font-size="8" fill="#fff" font-weight="700">✓</text>
  <text x="40" y="265" fill="#F8FAFC" font-size="10">⏱ TTFT</text>
  <rect x="166" y="250" width="138" height="22" rx="4" fill="#1A1E2F" stroke="#272F42"/>
  <rect x="172" y="255" width="12" height="12" rx="2" fill="#22C55E"/>
  <text x="175" y="265" font-size="8" fill="#fff" font-weight="700">✓</text>
  <text x="190" y="265" fill="#F8FAFC" font-size="10">$ Cost</text>

  <!-- Model Aliases -->
  <text x="16" y="294" fill="#64748B" font-size="9" letter-spacing="0.5">MODEL ALIASES</text>
  <rect x="16" y="300" width="288" height="36" rx="4" fill="#1A1E2F" stroke="#272F42"/>
  <text x="24" y="316" fill="#64748B" font-size="10" font-family="'Fira Code', monospace">claude-opus-4 → opus</text>
  <text x="24" y="330" fill="#64748B" font-size="10" font-family="'Fira Code', monospace">claude-sonnet-4 → sonnet</text>

  <!-- Cost Time Window -->
  <text x="16" y="358" fill="#64748B" font-size="9" letter-spacing="0.5">COST — TIME WINDOW</text>
  <rect x="16" y="364" width="60" height="26" rx="4" fill="#1A1E2F" stroke="#272F42"/>
  <text x="46" y="381" fill="#F8FAFC" font-size="11" text-anchor="middle">1</text>
  <rect x="82" y="364" width="80" height="26" rx="4" fill="#1A1E2F" stroke="#272F42"/>
  <text x="90" y="381" fill="#F8FAFC" font-size="11">Day</text>
  <polygon points="150,377 154,377 152,381" fill="#64748B"/>

  <!-- Watch Sources -->
  <text x="16" y="412" fill="#64748B" font-size="9" letter-spacing="0.5">WATCH SOURCES</text>
  <rect x="16" y="418" width="138" height="22" rx="4" fill="#1A1E2F" stroke="#272F42"/>
  <rect x="22" y="423" width="12" height="12" rx="2" fill="#22C55E"/>
  <text x="25" y="433" font-size="8" fill="#fff" font-weight="700">✓</text>
  <text x="40" y="433" fill="#F8FAFC" font-size="10">Claude Code</text>
  <rect x="166" y="418" width="138" height="22" rx="4" fill="#1A1E2F" stroke="#272F42"/>
  <rect x="172" y="423" width="12" height="12" rx="2" fill="#22C55E"/>
  <text x="175" y="433" font-size="8" fill="#fff" font-weight="700">✓</text>
  <text x="190" y="433" fill="#F8FAFC" font-size="10">Codex CLI</text>

  <!-- Cost Project Whitelist -->
  <text x="16" y="462" fill="#64748B" font-size="9" letter-spacing="0.5">COST — PROJECT WHITELIST</text>
  <rect x="16" y="468" width="288" height="48" rx="4" fill="#1A1E2F" stroke="#272F42"/>
  <text x="24" y="486" fill="#64748B" font-size="10" font-family="'Fira Code', monospace">/Users/me/project-a</text>
  <text x="24" y="500" fill="#64748B" font-size="10" font-family="'Fira Code', monospace">/Users/me/project-b</text>
  <!-- Model Prices -->
  <text x="16" y="540" fill="#64748B" font-size="9" letter-spacing="0.5">MODEL PRICES</text>
  <!-- Sync dropdown + button -->
  <rect x="16" y="546" width="120" height="24" rx="4" fill="#1A1E2F" stroke="#272F42"/>
  <text x="24" y="562" fill="#F8FAFC" font-size="10">LiteLLM</text>
  <polygon points="124,558 128,558 126,562" fill="#64748B"/>
  <rect x="142" y="546" width="50" height="24" rx="4" fill="#22C55E"/>
  <text x="167" y="562" fill="#fff" font-size="10" text-anchor="middle">Sync</text>
  <!-- Table header -->
  <rect x="16" y="576" width="288" height="20" rx="0" fill="#1A1E2F"/>
  <text x="24" y="590" fill="#64748B" font-size="8">Model</text>
  <text x="140" y="590" fill="#64748B" font-size="8">Input</text>
  <text x="180" y="590" fill="#64748B" font-size="8">Output</text>
  <text x="220" y="590" fill="#64748B" font-size="8">Cache</text>
  <text x="268" y="590" fill="#64748B" font-size="8">Src</text>
  <!-- Row 1 -->
  <line x1="16" y1="596" x2="304" y2="596" stroke="#272F42"/>
  <text x="24" y="610" fill="#F8FAFC" font-size="9">claude-opus-4</text>
  <text x="140" y="610" fill="#F8FAFC" font-size="9">$15</text>
  <text x="180" y="610" fill="#F8FAFC" font-size="9">$75</text>
  <text x="220" y="610" fill="#F8FAFC" font-size="9">$1.88</text>
  <text x="268" y="610" fill="#64748B" font-size="8">Lite</text>
  <!-- Row 2 -->
  <line x1="16" y1="616" x2="304" y2="616" stroke="#272F42"/>
  <text x="24" y="630" fill="#F8FAFC" font-size="9">claude-sonnet-4</text>
  <text x="140" y="630" fill="#F8FAFC" font-size="9">$3</text>
  <text x="180" y="630" fill="#F8FAFC" font-size="9">$15</text>
  <text x="220" y="630" fill="#F8FAFC" font-size="9">$0.30</text>
  <text x="268" y="630" fill="#64748B" font-size="8">Lite</text>
  <!-- Row 3 -->
  <line x1="16" y1="636" x2="304" y2="636" stroke="#272F42"/>
  <text x="24" y="650" fill="#F8FAFC" font-size="9">gpt-4.1</text>
  <text x="140" y="650" fill="#F8FAFC" font-size="9">$2</text>
  <text x="180" y="650" fill="#F8FAFC" font-size="9">$8</text>
  <text x="220" y="650" fill="#F8FAFC" font-size="9">$0.50</text>
  <text x="268" y="650" fill="#64748B" font-size="8">Lite</text>

  <!-- Model History Data -->
  <line x1="16" y1="670" x2="304" y2="670" stroke="#272F42"/>
  <text x="16" y="692" fill="#64748B" font-size="9" letter-spacing="0.5">MODEL HISTORY DATA</text>
  <text x="16" y="708" fill="#64748B" font-size="10">Manage stored request history and model data.</text>
  <!-- Delete button -->
  <rect x="16" y="716" width="136" height="26" rx="4" fill="transparent" stroke="#EF4444"/>
  <text x="84" y="733" fill="#EF4444" font-size="10" text-anchor="middle">Delete Project</text>
  <!-- Delete All button -->
  <rect x="160" y="716" width="144" height="26" rx="4" fill="#EF4444"/>
  <text x="232" y="733" fill="#fff" font-size="10" text-anchor="middle">Delete All Data</text>

</svg>